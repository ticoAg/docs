name: Check stars lists coverage

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Stars Lists coverage in index
        run: node scripts/stars/check-star-lists.mjs --config scripts/stars/star-lists.config.json

