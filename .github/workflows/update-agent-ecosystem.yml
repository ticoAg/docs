name: Update agent ecosystem stars

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update stars in indexes/agent-ecosystem.mdx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-agent-ecosystem.mjs indexes/agent-ecosystem.mdx

      - name: Open PR (if any changes)
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/update-agent-ecosystem-stars
          delete-branch: true
          title: "docs: update agent ecosystem stars"
          commit-message: "docs: update agent ecosystem stars"
          body: "Automated update of GitHub ⭐ star counts in `indexes/agent-ecosystem.mdx`."
          add-paths: |
            indexes/agent-ecosystem.mdx
